services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: hedge_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hedge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-hedge_quant}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hedge} -d ${DB_NAME:-hedge_quant}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
