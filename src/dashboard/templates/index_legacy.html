<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hedge Quant Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #0a0a0a; color: #eaeaea; font-family: 'SF Mono', Menlo, monospace; font-size: 13px; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #262626; background: #121212; flex: 0 0 auto; flex-wrap: wrap; row-gap: 8px; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .5px; color: #F5C518; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.live { background: #1a7f37; color: #fff; }
  .badge.disconnected { background: #2a2a2a; color: #f85149; border: 1px solid #3a3a3a; }
  .badge.dryrun { background: #263238; color: #a9c1cf; border: 1px solid #33424a; }
  .badge.live-trading {
    background: #3a0e0e;
    color: #F5C518;
    border: 1px solid #f85149;
    font-weight: 800;
    letter-spacing: .5px;
    text-shadow: 0 0 6px rgba(245, 197, 24, 0.55);
    animation: pulseLive 2s infinite;
  }
  @keyframes pulseLive {
    0%   { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.55); }
    70%  { box-shadow: 0 0 0 9px rgba(248, 81, 73, 0); }
    100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); }
  }
  .grid { display: grid; grid-template-columns: 1fr 320px; gap: 1px; background: #262626; flex: 1 1 auto; min-height: 0; }
  .panel { background: #0a0a0a; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .panel-header { padding: 10px 16px; border-bottom: 1px solid #262626; font-weight: 600; font-size: 12px; color: #a39c8f; text-transform: uppercase; letter-spacing: .6px; display: flex; justify-content: space-between; align-items: center; flex: 0 0 auto; flex-wrap: wrap; row-gap: 6px; }
  #chart { width: 100%; flex: 1 1 auto; min-height: 0; }
  .right-col { display: flex; flex-direction: column; gap: 1px; background: #262626; }
  .right-panel { background: #121212; overflow: auto; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #262626; }
  .metric { background: #121212; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: #a39c8f; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; color: #eaeaea; }
  .metric-value.green { color: #3fb950; }
  .metric-value.red { color: #f85149; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 8px 12px; text-align: left; font-size: 11px; color: #F5C518; border-bottom: 1px solid #262626; position: sticky; top: 0; background: #121212; }
  td { padding: 7px 12px; border-bottom: 1px solid #1e1e1e; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .side-buy { color: #3fb950; }
  .side-sell { color: #f85149; }
  .status-submitted { color: #79c0ff; }
  .status-filled { color: #3fb950; }
  .status-rejected { color: #f85149; }
  .pnl-green { color: #3fb950; }
  .pnl-red { color: #f85149; }
  .placeholder-row td { color: #6b6b6b; }
  #symbol-tabs { display: flex; gap: 1px; background: #262626; }
  #mode-toggle { display: flex; gap: 1px; background: #262626; }
  .sym-tab { padding: 8px 14px; cursor: pointer; font-size: 12px; font-weight: 600; color: #a39c8f; background: #121212; border: none; }
  .sym-tab.active { color: #eaeaea; border-bottom: 2px solid #F5C518; }

  .tf-dropdown { position: relative; }
  .tf-toggle-btn { display:flex; align-items:center; gap:6px; padding:6px 12px; cursor:pointer; font-size:12px; font-weight:600; color:#a39c8f; background:#121212; border:1px solid #262626; border-radius:6px; font-family:inherit; }
  .tf-toggle-btn:hover { color:#eaeaea; border-color:#3a3a3a; }
  .tf-menu { position:absolute; top:calc(100% + 4px); left:0; background:#121212; border:1px solid #262626; border-radius:6px; z-index:20; display:flex; flex-direction:column; min-width:80px; overflow:hidden; }
  .tf-menu.hidden { display:none; }
  .tf-option { padding:7px 14px; text-align:left; cursor:pointer; font-size:12px; font-weight:600; color:#a39c8f; background:#121212; border:none; font-family:inherit; }
  .tf-option:hover { background:#1a1a1a; color:#eaeaea; }
  .tf-option.active { color:#F5C518; }

  #compare-legend { display:none; gap:8px; align-items:center; flex-wrap:wrap; padding:8px 16px; border-bottom:1px solid #262626; }
  .legend-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:12px; background:#1a1a1a; border:1px solid #333; font-size:12px; font-weight:600; }
  .legend-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .legend-remove { color:#a39c8f; cursor:pointer; font-weight:700; }
  .legend-remove:hover { color:#f85149; }
  .legend-add-input { background:#1a1a1a; border:1px solid #333; color:#eaeaea; padding:4px 10px; border-radius:12px; width:90px; font-family:inherit; font-size:12px; outline:none; }
  .legend-add-input:focus { border-color:#F5C518; }

  #search-bar { display:flex; gap:8px; align-items:center; margin-left:auto; }
  #sym-input { background:#1a1a1a; border:1px solid #333; color:#eaeaea; padding:5px 10px; border-radius:6px; font-family:inherit; font-size:13px; width:110px; outline:none; }
  #sym-input:focus { border-color:#F5C518; }
  #sym-btn { background:#F5C518; color:#0a0a0a; border:none; padding:5px 12px; border-radius:6px; cursor:pointer; font-size:13px; font-family:inherit; font-weight:700; }
  #sym-btn:hover { background:#ffd83d; }
  #search-status { font-size:11px; color:#a39c8f; }
  #no-data { color: #a39c8f; padding: 20px; text-align: center; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>&#9650; Hedge Quant</h1>
  <span id="conn-badge" class="badge disconnected">CONNECTING</span>
  <span id="mode-badge" class="badge dryrun">DRY RUN</span>
  <span id="last-ts" style="color:#a39c8f;font-size:11px;margin-left:auto"></span>
  <div id="search-bar">
    <input id="sym-input" placeholder="e.g. TSLA" maxlength="8" />
    <button id="sym-btn">Subscribe</button>
    <span id="search-status"></span>
  </div>
</header>

<div class="grid">
  <!-- Left: chart -->
  <div class="panel">
    <div class="panel-header">
      <div style="display:flex;gap:12px;align-items:center">
        <div class="tf-dropdown" id="tf-dropdown">
          <button class="tf-toggle-btn" id="tf-toggle">&#9776; <span id="tf-current">1m</span></button>
          <div class="tf-menu hidden" id="tf-menu">
            <button class="tf-option active" data-tf="60">1m</button>
            <button class="tf-option" data-tf="300">5m</button>
            <button class="tf-option" data-tf="600">10m</button>
            <button class="tf-option" data-tf="1800">30m</button>
            <button class="tf-option" data-tf="3600">1h</button>
            <button class="tf-option" data-tf="14400">4h</button>
            <button class="tf-option" data-tf="86400">1d</button>
          </div>
        </div>
        <span id="chart-label">1m Bars (delayed)</span>
      </div>
      <div style="display:flex;gap:16px;align-items:center">
        <div id="mode-toggle">
          <button class="sym-tab active" data-mode="chart">Chart</button>
          <button class="sym-tab" data-mode="compare">Compare</button>
        </div>
        <div id="symbol-tabs"></div>
      </div>
    </div>
    <div id="compare-legend"></div>
    <div id="chart"></div>
  </div>

  <!-- Right: metrics + orders + holdings -->
  <div style="display:flex;flex-direction:column;gap:1px;background:#262626;overflow:hidden">
    <!-- Metrics -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Last Price</div>
        <div class="metric-value" id="m-close">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Volume</div>
        <div class="metric-value" id="m-vol">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Position (USD)</div>
        <div class="metric-value" id="m-pos">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Bar Count</div>
        <div class="metric-value" id="m-bars">0</div>
      </div>
    </div>

    <!-- Orders -->
    <div class="right-panel" style="flex:1;min-height:0">
      <div class="panel-header"><span id="orders-header-label">Trade History</span></div>
      <table id="orders-table">
        <thead><tr><th>Time</th><th>Side</th><th>Qty</th><th>Status</th></tr></thead>
        <tbody id="orders-body"></tbody>
      </table>
      <div id="no-orders" style="color:#a39c8f;padding:20px;text-align:center;font-size:12px">No orders yet</div>
    </div>

    <!-- Holdings -->
    <div class="right-panel" style="flex:0 0 auto;min-height:120px">
      <div class="panel-header">Holdings</div>
      <table id="holdings-table">
        <thead>
          <tr>
            <th>Symbol</th><th>Qty</th><th>Avg Cost</th><th>Live Price</th><th>P&amp;L $</th><th>P&amp;L %</th>
          </tr>
        </thead>
        <tbody id="holdings-body"></tbody>
      </table>
      <div id="no-holdings" style="color:#a39c8f;padding:12px;text-align:center;font-size:12px">No holdings</div>
    </div>
  </div>
</div>

<script>
const chartEl = document.getElementById('chart');
const chart = LightweightCharts.createChart(chartEl, {
  layout: { background: { color: '#0a0a0a' }, textColor: '#a39c8f' },
  grid: { vertLines: { color: '#1a1a1a' }, horzLines: { color: '#1a1a1a' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { borderColor: '#262626' },
  timeScale: {
    borderColor: '#262626',
    timeVisible: true,
    secondsVisible: true,
    tickMarkFormatter: (time) => new Date(time * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
  },
  localization: {
    timeFormatter: (time) => new Date(time * 1000).toLocaleTimeString(),
  },
  width: chartEl.offsetWidth,
  height: chartEl.offsetHeight,
});

const candleSeries = chart.addCandlestickSeries({
  upColor: '#3fb950', downColor: '#f85149',
  borderUpColor: '#3fb950', borderDownColor: '#f85149',
  wickUpColor: '#3fb950', wickDownColor: '#f85149',
});

const volSeries = chart.addHistogramSeries({
  priceFormat: { type: 'volume' },
  priceScaleId: 'vol',
  color: '#F5C51833',
});
chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

const state = {
  bars: {}, orders: [], positions: {}, activeSymbol: null, portfolio: [], watchlist: [],
  tradingEnabled: false, timeframeSeconds: 60, mode: 'chart', compareSymbols: [], compareColors: {},
};
const lineSeriesBySymbol = {};
const COMPARE_PALETTE = ['#F5C518', '#79c0ff', '#3fb950', '#f85149', '#c586ff', '#ff9d5c', '#5ce1e6', '#eaeaea'];

// Aggregates raw 1-minute bars into `seconds`-wide candles (open=first, high=max,
// low=min, close=last, volume=sum). Bars must already be in ascending time order.
function resampleBars(bars, seconds) {
  const buckets = new Map();
  for (const b of bars) {
    const bucketTime = Math.floor(b.time / seconds) * seconds;
    const agg = buckets.get(bucketTime);
    if (!agg) {
      buckets.set(bucketTime, { time: bucketTime, open: b.open, high: b.high, low: b.low, close: b.close, volume: b.volume });
    } else {
      agg.high = Math.max(agg.high, b.high);
      agg.low = Math.min(agg.low, b.low);
      agg.close = b.close;
      agg.volume += b.volume;
    }
  }
  return Array.from(buckets.values()).sort((a, b) => a.time - b.time);
}

function renderChart(sym) {
  sym = sym || state.activeSymbol;
  if (!sym) return;
  const raw = state.bars[sym] || [];
  const displayed = resampleBars(raw, state.timeframeSeconds);
  candleSeries.setData(displayed);
  volSeries.setData(displayed.map(b => ({ time: b.time, value: b.volume, color: b.close >= b.open ? '#3fb95044' : '#f8514944' })));
  updateMetrics(sym, raw, displayed);
}

function colorForCompareSymbol(sym) {
  if (!state.compareColors[sym]) {
    const used = new Set(Object.values(state.compareColors));
    const next = COMPARE_PALETTE.find(c => !used.has(c)) || COMPARE_PALETTE[state.compareSymbols.length % COMPARE_PALETTE.length];
    state.compareColors[sym] = next;
  }
  return state.compareColors[sym];
}

// Overlay mode: each symbol's bars are normalized to % change from the first
// bar in the resampled window so differently-priced stocks are comparable.
function renderCompare() {
  for (const sym of state.compareSymbols) {
    const raw = state.bars[sym] || [];
    const displayed = resampleBars(raw, state.timeframeSeconds);
    const series = lineSeriesBySymbol[sym];
    if (!series || displayed.length === 0) continue;
    const base = displayed[0].close;
    series.setData(displayed.map(b => ({ time: b.time, value: base ? (b.close - base) / base * 100 : 0 })));
  }
}

function renderLegend() {
  const el = document.getElementById('compare-legend');
  el.innerHTML = state.compareSymbols.map(sym => `
    <span class="legend-chip" data-sym="${sym}">
      <span class="legend-dot" style="background:${state.compareColors[sym]}"></span>${sym}
      <span class="legend-remove" data-remove="${sym}">&times;</span>
    </span>`).join('') + `<input id="compare-add-input" class="legend-add-input" placeholder="+ Add symbol" maxlength="8" />`;

  el.querySelectorAll('.legend-remove').forEach(x => {
    x.onclick = () => removeCompareSymbol(x.dataset.remove);
  });
  const input = document.getElementById('compare-add-input');
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const sym = input.value.toUpperCase().trim();
      if (sym) addCompareSymbol(sym);
      input.value = '';
    }
  });
}

async function addCompareSymbol(sym) {
  sym = sym.toUpperCase().trim();
  if (!sym || state.compareSymbols.includes(sym)) return;
  state.compareSymbols.push(sym);
  colorForCompareSymbol(sym);
  ensureTab(sym);
  try {
    await fetch('/api/subscribe/' + sym, { method: 'POST' });
  } catch (e) {
    // best effort — chart will just stay flat until data arrives
  }
  if (!state.bars[sym] || state.bars[sym].length === 0) {
    await loadBarHistory(sym);
  }
  lineSeriesBySymbol[sym] = chart.addLineSeries({
    color: state.compareColors[sym], lineWidth: 2, priceFormat: { type: 'percent' },
  });
  renderLegend();
  renderCompare();
}

function removeCompareSymbol(sym) {
  state.compareSymbols = state.compareSymbols.filter(s => s !== sym);
  const series = lineSeriesBySymbol[sym];
  if (series) { chart.removeSeries(series); delete lineSeriesBySymbol[sym]; }
  renderLegend();
}

function setMode(mode) {
  state.mode = mode;
  const isCompare = mode === 'compare';
  document.querySelectorAll('#mode-toggle .sym-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('compare-legend').style.display = isCompare ? 'flex' : 'none';
  document.getElementById('symbol-tabs').style.display = isCompare ? 'none' : 'flex';
  candleSeries.applyOptions({ visible: !isCompare });
  volSeries.applyOptions({ visible: !isCompare });
  if (isCompare) {
    renderLegend();
    if (state.compareSymbols.length === 0 && state.activeSymbol) {
      addCompareSymbol(state.activeSymbol);
    } else {
      renderCompare();
    }
  } else {
    renderChart();
  }
}

function switchSymbol(sym) {
  state.activeSymbol = sym;
  document.querySelectorAll('#symbol-tabs .sym-tab').forEach(t => t.classList.toggle('active', t.dataset.sym === sym));
  renderChart(sym);
  loadOrderHistory(sym);
  loadBarHistory(sym);
}

function updateMetrics(sym, rawBars, displayedBars) {
  rawBars = rawBars || state.bars[sym] || [];
  displayedBars = displayedBars || resampleBars(rawBars, state.timeframeSeconds);
  const last = rawBars[rawBars.length - 1];
  if (last) {
    const cl = last.close;
    const prev = rawBars.length > 1 ? rawBars[rawBars.length - 2].close : cl;
    const pct = ((cl - prev) / prev * 100).toFixed(2);
    const color = cl >= prev ? 'green' : 'red';
    document.getElementById('m-close').textContent = `$${cl.toFixed(2)} (${pct}%)`;
    document.getElementById('m-close').className = `metric-value ${color}`;
    document.getElementById('m-vol').textContent = last.volume.toLocaleString();
    document.getElementById('m-bars').textContent = displayedBars.length;
    document.getElementById('last-ts').textContent = new Date(last.time * 1000).toLocaleTimeString();
  }
  const pos = state.positions[sym];
  document.getElementById('m-pos').textContent = pos !== undefined ? `$${pos.toLocaleString(undefined, {maximumFractionDigits: 0})}` : '—';
}

async function loadBarHistory(sym) {
  try {
    const r = await fetch('/api/bars/' + encodeURIComponent(sym));
    const rows = await r.json();
    const fetched = rows.map(row => ({
      time: Math.floor(new Date(row.timestamp).getTime() / 1000),
      open: row.open, high: row.high, low: row.low, close: row.close, volume: row.volume,
    }));
    const merged = new Map();
    for (const b of fetched) merged.set(b.time, b);
    for (const b of (state.bars[sym] || [])) merged.set(b.time, b); // live bars win on overlap
    state.bars[sym] = Array.from(merged.values()).sort((a, b) => a.time - b.time);
  } catch (e) {
    // keep whatever bars we already have in memory
  }
  if (state.activeSymbol === sym) renderChart(sym);
}

function renderOrders() {
  const tbody = document.getElementById('orders-body');
  const none = document.getElementById('no-orders');
  const orders = state.orders || [];
  if (orders.length === 0) { tbody.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';
  tbody.innerHTML = orders.slice().reverse().map(o => {
    const rawTs = o.submitted_at || o.timestamp;
    const ts = rawTs ? new Date(rawTs).toLocaleString() : '—';
    return `
    <tr>
      <td>${ts}</td>
      <td class="side-${(o.side || '').toLowerCase()}">${o.side}</td>
      <td>${o.quantity}</td>
      <td class="status-${(o.status || '').toLowerCase()}">${o.status}</td>
    </tr>`;
  }).join('');
}

async function loadOrderHistory(sym) {
  document.getElementById('orders-header-label').textContent = `Trade History — ${sym}`;
  try {
    const r = await fetch('/api/orders/' + encodeURIComponent(sym));
    state.orders = await r.json();
  } catch (e) {
    state.orders = [];
  }
  renderOrders();
}

function renderHoldings() {
  const tbody = document.getElementById('holdings-body');
  const none = document.getElementById('no-holdings');
  const portfolio = Array.isArray(state.portfolio) ? state.portfolio : [];
  const watchlist = Array.isArray(state.watchlist) ? state.watchlist : [];
  const seen = new Set(portfolio.map(p => p.symbol));
  const placeholders = watchlist
    .filter(sym => !seen.has(sym))
    .map(sym => ({ symbol: sym, qty: 0, avg_cost: null, price: null, unrealized_pnl: null, unrealized_pnl_pct: null }));
  const rows = portfolio.concat(placeholders);

  if (rows.length === 0) { tbody.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';

  tbody.innerHTML = rows.map(r => {
    const isPlaceholder = r.avg_cost === null || r.avg_cost === undefined;
    const hasPnl = typeof r.unrealized_pnl === 'number';
    const pnlClass = hasPnl ? (r.unrealized_pnl >= 0 ? 'pnl-green' : 'pnl-red') : '';
    const pnlStr = hasPnl ? `$${r.unrealized_pnl.toFixed(2)}` : '—';
    const pnlPctStr = typeof r.unrealized_pnl_pct === 'number' ? `${r.unrealized_pnl_pct.toFixed(2)}%` : '—';
    const avgCostStr = typeof r.avg_cost === 'number' ? `$${r.avg_cost.toFixed(2)}` : '—';
    const priceStr = typeof r.price === 'number' ? `$${r.price.toFixed(2)}` : '—';
    return `<tr${isPlaceholder ? ' class="placeholder-row"' : ''}>
      <td>${r.symbol}</td>
      <td>${r.qty ?? 0}</td>
      <td>${avgCostStr}</td>
      <td>${priceStr}</td>
      <td class="${pnlClass}">${pnlStr}</td>
      <td class="${pnlClass}">${pnlPctStr}</td>
    </tr>`;
  }).join('');
}

function setModeBadge(enabled) {
  const el = document.getElementById('mode-badge');
  if (enabled) {
    el.textContent = 'LIVE PAPER TRADING';
    el.className = 'badge live-trading';
  } else {
    el.textContent = 'DRY RUN';
    el.className = 'badge dryrun';
  }
}

function ensureTab(sym) {
  const tabs = document.getElementById('symbol-tabs');
  if (!tabs.querySelector(`[data-sym="${sym}"]`)) {
    const btn = document.createElement('button');
    btn.className = 'sym-tab';
    btn.dataset.sym = sym;
    btn.textContent = sym;
    btn.onclick = () => switchSymbol(sym);
    tabs.appendChild(btn);
  }
  if (!state.activeSymbol) switchSymbol(sym);
}

function handleMessage(msg) {
  if (msg.type === 'snapshot') {
    state.positions = msg.positions || {};
    state.portfolio = msg.portfolio || [];
    state.watchlist = msg.watchlist || [];
    state.tradingEnabled = !!msg.trading_enabled;
    for (const [sym, bars] of Object.entries(msg.bars || {})) {
      state.bars[sym] = bars;
      ensureTab(sym);
    }
    if (state.activeSymbol) switchSymbol(state.activeSymbol);
    renderHoldings();
    setModeBadge(state.tradingEnabled);
  } else if (msg.type === 'bar') {
    const sym = msg.symbol;
    if (!state.bars[sym]) state.bars[sym] = [];
    const last = state.bars[sym][state.bars[sym].length - 1];
    if (last && last.time === msg.data.time) {
      state.bars[sym][state.bars[sym].length - 1] = msg.data;
    } else {
      state.bars[sym].push(msg.data);
    }
    ensureTab(sym);
    if (state.mode === 'chart' && state.activeSymbol === sym) {
      renderChart(sym);
    } else if (state.mode === 'compare' && state.compareSymbols.includes(sym)) {
      renderCompare();
    }
  } else if (msg.type === 'order') {
    if (msg.data.symbol === state.activeSymbol) {
      state.orders.push(msg.data);
      renderOrders();
    }
  } else if (msg.type === 'position') {
    state.positions[msg.symbol] = msg.value;
    if (state.activeSymbol === msg.symbol) updateMetrics(msg.symbol);
  } else if (msg.type === 'portfolio') {
    state.portfolio = msg.data || [];
    renderHoldings();
  }
}

function connect() {
  const badge = document.getElementById('conn-badge');
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { badge.textContent = 'LIVE'; badge.className = 'badge live'; };
  ws.onclose = () => { badge.textContent = 'DISCONNECTED'; badge.className = 'badge disconnected'; setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch(err) { console.error(err); } };
}

window.addEventListener('resize', () => {
  chart.applyOptions({ width: chartEl.offsetWidth, height: chartEl.offsetHeight });
});


document.getElementById('sym-btn').onclick = async () => {
  const sym = document.getElementById('sym-input').value.toUpperCase().trim();
  const status = document.getElementById('search-status');
  if (!sym) return;
  status.textContent = 'subscribing...';
  try {
    const r = await fetch('/api/subscribe/' + sym, { method: 'POST' });
    const j = await r.json();
    if (j.status === 'subscribed' || j.status === 'already_subscribed') {
      if (!state.bars[sym]) state.bars[sym] = [];
      ensureTab(sym);
      switchSymbol(sym);
      status.textContent = j.status === 'subscribed' ? sym + ' subscribed — loading data...' : sym + ' already active';
    } else {
      status.textContent = j.detail || 'error';
    }
  } catch(e) { status.textContent = 'request failed'; }
  setTimeout(() => document.getElementById('search-status').textContent = '', 3000);
};
document.getElementById('sym-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('sym-btn').click();
});

document.getElementById('tf-toggle').onclick = (e) => {
  e.stopPropagation();
  document.getElementById('tf-menu').classList.toggle('hidden');
};
document.querySelectorAll('#tf-menu .tf-option').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#tf-menu .tf-option').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.timeframeSeconds = parseInt(btn.dataset.tf, 10);
    document.getElementById('tf-current').textContent = btn.textContent;
    document.getElementById('chart-label').textContent = `${btn.textContent} Bars (delayed)`;
    document.getElementById('tf-menu').classList.add('hidden');
    if (state.mode === 'compare') renderCompare(); else renderChart();
  };
});
document.addEventListener('click', (e) => {
  const dd = document.getElementById('tf-dropdown');
  if (dd && !dd.contains(e.target)) document.getElementById('tf-menu').classList.add('hidden');
});

document.querySelectorAll('#mode-toggle .sym-tab').forEach(btn => {
  btn.onclick = () => setMode(btn.dataset.mode);
});

connect();
</script>
</body>
</html>
