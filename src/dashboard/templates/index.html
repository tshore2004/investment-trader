<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hedge Quant Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'SF Mono', Menlo, monospace; font-size: 13px; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #21262d; background: #161b22; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .5px; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.live { background: #1a7f37; color: #fff; }
  .badge.disconnected { background: #6e40c9; color: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 320px; gap: 1px; background: #21262d; height: calc(100vh - 49px); }
  .panel { background: #0d1117; overflow: hidden; }
  .panel-header { padding: 10px 16px; border-bottom: 1px solid #21262d; font-weight: 600; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .6px; display: flex; justify-content: space-between; align-items: center; }
  #chart { width: 100%; height: calc(100% - 40px); }
  .right-col { display: flex; flex-direction: column; gap: 1px; background: #21262d; }
  .right-panel { background: #0d1117; overflow: auto; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #21262d; }
  .metric { background: #0d1117; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; color: #e6edf3; }
  .metric-value.green { color: #3fb950; }
  .metric-value.red { color: #f85149; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 8px 12px; text-align: left; font-size: 11px; color: #8b949e; border-bottom: 1px solid #21262d; position: sticky; top: 0; background: #0d1117; }
  td { padding: 7px 12px; border-bottom: 1px solid #161b22; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .side-buy { color: #3fb950; }
  .side-sell { color: #f85149; }
  .status-submitted { color: #79c0ff; }
  .status-filled { color: #3fb950; }
  .status-rejected { color: #f85149; }
  #symbol-tabs { display: flex; gap: 1px; background: #21262d; }
  .sym-tab { padding: 8px 14px; cursor: pointer; font-size: 12px; font-weight: 600; color: #8b949e; background: #0d1117; border: none; }
  .sym-tab.active { color: #e6edf3; border-bottom: 2px solid #58a6ff; }
  #no-data { color: #8b949e; padding: 20px; text-align: center; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>&#9650; Hedge Quant</h1>
  <span id="conn-badge" class="badge disconnected">CONNECTING</span>
  <span id="last-ts" style="color:#8b949e;font-size:11px;margin-left:auto"></span>
</header>

<div class="grid">
  <!-- Left: chart -->
  <div class="panel">
    <div class="panel-header">
      <span>5-Second Bars</span>
      <div id="symbol-tabs"></div>
    </div>
    <div id="chart"></div>
  </div>

  <!-- Right: metrics + orders + positions -->
  <div style="display:flex;flex-direction:column;gap:1px;background:#21262d;overflow:hidden">
    <!-- Metrics -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Last Price</div>
        <div class="metric-value" id="m-close">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Volume</div>
        <div class="metric-value" id="m-vol">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Position (USD)</div>
        <div class="metric-value" id="m-pos">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Bar Count</div>
        <div class="metric-value" id="m-bars">0</div>
      </div>
    </div>

    <!-- Orders -->
    <div class="right-panel" style="flex:1;min-height:0">
      <div class="panel-header">Recent Orders</div>
      <table id="orders-table">
        <thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Status</th></tr></thead>
        <tbody id="orders-body"></tbody>
      </table>
      <div id="no-orders" style="color:#8b949e;padding:20px;text-align:center;font-size:12px">No orders yet</div>
    </div>

    <!-- Positions -->
    <div class="right-panel" style="flex:0 0 auto;min-height:80px">
      <div class="panel-header">Positions (USD)</div>
      <table id="pos-table">
        <thead><tr><th>Symbol</th><th>USD Value</th></tr></thead>
        <tbody id="pos-body"></tbody>
      </table>
      <div id="no-pos" style="color:#8b949e;padding:12px;text-align:center;font-size:12px">No positions</div>
    </div>
  </div>
</div>

<script>
const chartEl = document.getElementById('chart');
const chart = LightweightCharts.createChart(chartEl, {
  layout: { background: { color: '#0d1117' }, textColor: '#8b949e' },
  grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { borderColor: '#21262d' },
  timeScale: { borderColor: '#21262d', timeVisible: true, secondsVisible: true },
  width: chartEl.offsetWidth,
  height: chartEl.offsetHeight,
});

const candleSeries = chart.addCandlestickSeries({
  upColor: '#3fb950', downColor: '#f85149',
  borderUpColor: '#3fb950', borderDownColor: '#f85149',
  wickUpColor: '#3fb950', wickDownColor: '#f85149',
});

const volSeries = chart.addHistogramSeries({
  priceFormat: { type: 'volume' },
  priceScaleId: 'vol',
  color: '#58a6ff33',
});
chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

const state = { bars: {}, orders: [], positions: {}, activeSymbol: null };

function switchSymbol(sym) {
  state.activeSymbol = sym;
  document.querySelectorAll('.sym-tab').forEach(t => t.classList.toggle('active', t.dataset.sym === sym));
  const bars = state.bars[sym] || [];
  candleSeries.setData(bars);
  volSeries.setData(bars.map(b => ({ time: b.time, value: b.volume, color: b.close >= b.open ? '#3fb95044' : '#f8514944' })));
  updateMetrics(sym);
}

function updateMetrics(sym) {
  const bars = state.bars[sym] || [];
  const last = bars[bars.length - 1];
  if (last) {
    const cl = last.close;
    const prev = bars.length > 1 ? bars[bars.length - 2].close : cl;
    const pct = ((cl - prev) / prev * 100).toFixed(2);
    const color = cl >= prev ? 'green' : 'red';
    document.getElementById('m-close').textContent = `$${cl.toFixed(2)} (${pct}%)`;
    document.getElementById('m-close').className = `metric-value ${color}`;
    document.getElementById('m-vol').textContent = last.volume.toLocaleString();
    document.getElementById('m-bars').textContent = bars.length;
    document.getElementById('last-ts').textContent = new Date(last.time * 1000).toLocaleTimeString();
  }
  const pos = state.positions[sym];
  document.getElementById('m-pos').textContent = pos !== undefined ? `$${pos.toLocaleString(undefined, {maximumFractionDigits: 0})}` : '—';
}

function renderOrders() {
  const tbody = document.getElementById('orders-body');
  const none = document.getElementById('no-orders');
  if (state.orders.length === 0) { tbody.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';
  tbody.innerHTML = state.orders.slice().reverse().map(o => `
    <tr>
      <td>${o.symbol}</td>
      <td class="side-${o.side.toLowerCase()}">${o.side}</td>
      <td>${o.quantity}</td>
      <td class="status-${o.status.toLowerCase()}">${o.status}</td>
    </tr>`).join('');
}

function renderPositions() {
  const tbody = document.getElementById('pos-body');
  const none = document.getElementById('no-pos');
  const entries = Object.entries(state.positions);
  if (entries.length === 0) { tbody.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';
  tbody.innerHTML = entries.map(([sym, val]) => `<tr><td>${sym}</td><td>$${val.toLocaleString()}</td></tr>`).join('');
}

function ensureTab(sym) {
  const tabs = document.getElementById('symbol-tabs');
  if (!tabs.querySelector(`[data-sym="${sym}"]`)) {
    const btn = document.createElement('button');
    btn.className = 'sym-tab';
    btn.dataset.sym = sym;
    btn.textContent = sym;
    btn.onclick = () => switchSymbol(sym);
    tabs.appendChild(btn);
  }
  if (!state.activeSymbol) switchSymbol(sym);
}

function handleMessage(msg) {
  if (msg.type === 'snapshot') {
    state.orders = msg.orders || [];
    state.positions = msg.positions || {};
    for (const [sym, bars] of Object.entries(msg.bars || {})) {
      state.bars[sym] = bars;
      ensureTab(sym);
    }
    if (state.activeSymbol) switchSymbol(state.activeSymbol);
    renderOrders();
    renderPositions();
  } else if (msg.type === 'bar') {
    const sym = msg.symbol;
    if (!state.bars[sym]) state.bars[sym] = [];
    const last = state.bars[sym][state.bars[sym].length - 1];
    if (last && last.time === msg.data.time) {
      state.bars[sym][state.bars[sym].length - 1] = msg.data;
    } else {
      state.bars[sym].push(msg.data);
    }
    ensureTab(sym);
    if (state.activeSymbol === sym) {
      candleSeries.update(msg.data);
      volSeries.update({ time: msg.data.time, value: msg.data.volume, color: msg.data.close >= msg.data.open ? '#3fb95044' : '#f8514944' });
      updateMetrics(sym);
    }
  } else if (msg.type === 'order') {
    state.orders.push(msg.data);
    renderOrders();
  } else if (msg.type === 'position') {
    state.positions[msg.symbol] = msg.value;
    renderPositions();
    if (state.activeSymbol === msg.symbol) updateMetrics(msg.symbol);
  }
}

function connect() {
  const badge = document.getElementById('conn-badge');
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { badge.textContent = 'LIVE'; badge.className = 'badge live'; };
  ws.onclose = () => { badge.textContent = 'DISCONNECTED'; badge.className = 'badge disconnected'; setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch(err) { console.error(err); } };
}

window.addEventListener('resize', () => {
  chart.applyOptions({ width: chartEl.offsetWidth, height: chartEl.offsetHeight });
});

connect();
</script>
</body>
</html>
